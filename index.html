<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аптечный каталог</title>

<script src="data.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

.top {
    padding: 10px;
    position: sticky;
    top: 0;
    background: white;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

#list {
    display: grid;
    gap: 12px;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 14px;
    padding: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: contain;
    cursor: pointer;
}

.title {
    font-weight: bold;
}

.ind {
    font-size: 13px;
    color: #555;
}

/* zoom */
.modal {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal img {
    max-width:90%;
    max-height:90%;
}
</style>
</head>

<body>

<div class="top">
    <input id="search" placeholder="Поиск..." oninput="search()">
</div>

<div id="list"></div>

<div id="modal" class="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>

// рендер
function render(data){
    let html = "";

    data.forEach(d=>{
        html += `
        <div class="card">
            ${d.photo ? `<img src="${d.photo}" onclick="openModal('${d.photo}')">` : ''}
            <div class="title">${d.name}</div>
            <div class="ind">${d.indications || ''}</div>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

// поиск
function search(){
    let q = document.getElementById("search").value.toLowerCase();

    let result = drugs.filter(d=>{
        let text = (d.name + " " + (d.indications || "")).toLowerCase();
        return text.includes(q);
    });

    render(result);
}

// zoom
function openModal(src){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = src;
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// старт
render(drugs);

</script>

</body>
</html>

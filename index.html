<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Каталог</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 10px;
    margin: 0;
}

h3 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

#list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.card {
    background: white;
    padding: 10px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);

    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.photo {
    width: 100%;
    max-width: 120px;
    height: 120px;
    object-fit: contain;
    background: white;
    margin: 0 auto 8px;
    border-radius: 10px;
    cursor: pointer;
}

.name {
    font-weight: bold;
}

.info {
    font-size: 13px;
    color: #555;
}

button {
    margin-top: 5px;
    padding: 8px;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: #2ea6ff;
    color: white;
    cursor: pointer;
}

.btn-secondary {
    background: #4caf50;
}

.back-btn {
    background: #ccc;
    color: black;
}

.card-full {
    background: white;
    padding: 15px;
    border-radius: 12px;
}

.card-full img {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
}

#cardView {
    display: none;
}

ul {
    text-align: left;
}

.section-title {
    font-weight: bold;
    margin-top: 10px;
}

.block {
    margin-bottom: 10px;
}

/* 🔥 ZOOM */
#zoomModal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#zoomImg {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    background: white;
}
</style>
</head>

<body>

<h3>💊 Каталог</h3>

<input id="search" placeholder="Поиск...">

<div id="list"></div>
<div id="cardView"></div>

<!-- 🔥 ZOOM -->
<div id="zoomModal" onclick="closeZoom()">
    <img id="zoomImg">
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// ===================
// 🔍 ПОИСК
// ===================
document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();

    render(drugs.filter(d =>
        d.name.toLowerCase().includes(q) ||
        d.indications.toLowerCase().includes(q)
    ));
});

// ===================
// 📦 СПИСОК
// ===================
function render(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(d => {
        list.innerHTML += `
        <div class="card">
            <img src="${d.photo}" class="photo" onclick="zoomImage('${d.photo}')">

            <div class="name">${d.name}</div>

            <div class="info">
                ${d.sostav}<br>
                ${d.form} (${d.dosage})
            </div>

            <button onclick="openCard('${d.name}')">Открыть</button>
        </div>
        `;
    });
}

// ===================
// 📖 КАРТОЧКА
// ===================
function openCard(name) {
    const d = drugs.find(x => x.name === name);

    document.getElementById("list").style.display = "none";
    document.getElementById("search").style.display = "none";

    const view = document.getElementById("cardView");
    view.style.display = "block";

    view.innerHTML = `
        <button class="back-btn" onclick="goBack()">⬅️ Назад</button>

        <div class="card-full">
            <img src="${d.photo}" onclick="zoomImage('${d.photo}')">

            <h3>${d.name}</h3>

            <p><b>Состав:</b> ${d.sostav}</p>
            <p><b>Форма:</b> ${d.form}</p>
            <p><b>Дозировка:</b> ${d.dosage}</p>
            <p><b>Группа:</b> ${d.group}</p>

            <p><b>Показания:</b></p>
            ${formatIndications(d.indications)}

            <button onclick="selectDrug('${d.name}')">Выбрать</button>
            <button class="btn-secondary" onclick="window.open('${d.url}')">🌐 Сайт</button>
        </div>
    `;
}

// ===================
// 🔙 НАЗАД
// ===================
function goBack() {
    document.getElementById("cardView").style.display = "none";
    document.getElementById("list").style.display = "grid";
    document.getElementById("search").style.display = "block";
}

// ===================
// 🧠 ФОРМАТ ПОКАЗАНИЙ
// ===================
function formatIndications(text) {
    if (!text) return "<p>—</p>";

    if (text.includes("<table")) return text;

    if (text.includes(";")) {
        let items = text.split(";").filter(i => i.trim());
        return "<ul>" + items.map(i => `<li>${i}</li>`).join("") + "</ul>";
    }

    return `<p>${text}</p>`;
}

// ===================
// 🔥 ZOOM
// ===================
function zoomImage(src) {
    document.getElementById("zoomImg").src = src;
    document.getElementById("zoomModal").style.display = "flex";
}

function closeZoom() {
    document.getElementById("zoomModal").style.display = "none";
}

// ===================
// 📤 В БОТА
// ===================
function selectDrug(name) {
    tg.sendData(JSON.stringify({name}));
}

// старт
render(drugs);
</script>

</body>
</html>

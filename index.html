<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Каталог</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: -apple-system, Arial;
    background: #f2f2f2;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 12px;
}

h3 { text-align: center; }

/* поиск */
.search-box {
    display: flex;
    gap: 8px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
}

.ai-btn {
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #7b5cff;
    color: white;
}

/* статус */
.status {
    margin: 10px 0;
    font-size: 14px;
}

/* GRID */
#list {
    display: grid;
    gap: 12px;
}

@media (max-width: 600px) {
    #list { grid-template-columns: 1fr; }
}
@media (min-width: 601px) {
    #list { grid-template-columns: 1fr 1fr; }
}

/* карточка */
.card {
    background: white;
    border-radius: 16px;
    padding: 10px;
    text-align: center;
}

.photo {
    width: 100%;
    height: 100px;
    object-fit: contain;
}

button {
    margin-top: 8px;
    padding: 8px;
    border-radius: 10px;
    border: none;
    background: #2ea6ff;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<h3>💊 AI Каталог</h3>

<div class="search-box">
    <input id="search" placeholder="Например: от давления или температуры">
    <button class="ai-btn" onclick="askAI()">AI</button>
</div>

<div id="status" class="status"></div>

<div id="list"></div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

/* обычный поиск */
document.getElementById("search").addEventListener("input", e => {
    let q = e.target.value.toLowerCase();

    let filtered = drugs.filter(d => {
        let text = `${d.name} ${d.indications}`.toLowerCase();
        return text.includes(q);
    });

    render(filtered);
});

/* AI поиск */
async function askAI() {
    let query = document.getElementById("search").value;

    if (!query) return;

    document.getElementById("status").innerText = "🤖 Подбираю препараты...";

    try {
        let res = await fetch("https://your-api.onrender.com/ai", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({query})
        });

        let data = await res.json();

        // 👉 получаем список названий
        let names = data.drugs || [];

        // 👉 ищем в базе
        let result = drugs.filter(d =>
            names.includes(d.name)
        );

        if (result.length === 0) {
            document.getElementById("status").innerText = "Ничего не найдено 😢";
        } else {
            document.getElementById("status").innerText = "Найдено:";
        }

        render(result);

    } catch(e) {
        document.getElementById("status").innerText = "Ошибка AI 😢";
    }
}

/* рендер */
function render(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(d => {
        list.innerHTML += `
        <div class="card">
            <img src="${d.photo}" class="photo">
            <b>${d.name}</b>
            <button onclick="tg.sendData('${d.name}')">Выбрать</button>
        </div>
        `;
    });
}

/* старт */
render(drugs);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Каталог препаратов</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="data.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 10px;
            background: #f5f5f5;
            margin: 0;
        }

        h3 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .photo {
            width: 100%;
            max-width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            margin: 0 auto 8px;
            display: block;
        }

        .name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .info {
            font-size: 13px;
            color: #555;
        }

        button {
            margin-top: 5px;
            padding: 8px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #2ea6ff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d8fe0;
        }

        .btn-secondary {
            background: #4caf50;
        }

        .btn-secondary:hover {
            background: #3e9443;
        }
    </style>
</head>

<body>

<h3>💊 Каталог</h3>

<input type="text" id="search" placeholder="Поиск...">

<div id="list"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function render(data) {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(d => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="${d.photo}" class="photo">

                <div class="name">${d.name}</div>

                <div class="info">
                    🧬 ${d.sostav}<br>
                    💊 ${d.form} (${d.dosage})<br>
                    🤒 ${d.indications}
                </div>

                <button onclick="selectDrug('${d.name}')">
                    Выбрать
                </button>

                <button class="btn-secondary" onclick="openLink('${d.url}')">
                    🌐 Сайт
                </button>
            `;

            list.appendChild(div);
        });
    }

    function selectDrug(name) {
        tg.sendData(JSON.stringify({
            action: "select",
            name: name
        }));
    }

    function openLink(url) {
        window.open(url, "_blank");
    }

    document.getElementById("search").addEventListener("input", (e) => {
        const q = e.target.value.toLowerCase();

        const filtered = drugs.filter(d =>
            d.name.toLowerCase().includes(q) ||
            d.indications.toLowerCase().includes(q) ||
            d.group.toLowerCase().includes(q)
        );

        render(filtered);
    });

    render(drugs);
</script>

</body>
</html>

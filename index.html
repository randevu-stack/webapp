<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurabek Laboratories</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system, Arial;
    background:#f2f2f7;
    max-width:1200px;
    margin:0 auto;
}

/* HEADER */
.header {
    padding:14px;
    font-size:18px;
    font-weight:600;
}

/* TABS */
.tabs {
    display:flex;
    gap:10px;
    padding:0 10px 10px;
}

.tab {
    flex:1;
    padding:10px;
    border-radius:10px;
    background:#e9e9ee;
    text-align:center;
    cursor:pointer;
}

.tab.active {
    background:#0a84ff;
    color:white;
}

/* SEARCH */
.top {
    padding:10px;
    position:relative;
}

input {
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#e9e9ee;
}

/* SUGGESTIONS */
.suggestions {
    position:absolute;
    top:52px;
    left:10px;
    right:10px;
    background:white;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.1);
    z-index:1000;
}

.suggestion {
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

/* GRID */
#list {
    display:grid;
    gap:14px;
    padding:10px;
    grid-template-columns: 1fr;
}

@media (min-width:600px){
    #list { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width:1024px){
    #list { grid-template-columns: repeat(3, 1fr); }
}

/* CARD */
.card {
    background:white;
    border-radius:18px;
    padding:12px;
    box-shadow:0 4px 18px rgba(0,0,0,0.08);
    position:relative;
}

/* FAVORITE */
.fav {
    position:absolute;
    right:12px;
    top:10px;
    font-size:20px;
    cursor:pointer;
}

/* IMAGE */
.card img {
    width:100%;
    height:150px;
    object-fit:contain;
    background:#f7f7f7;
    border-radius:12px;
}

.big-img { height:220px !important; cursor:pointer; }

/* TEXT */
.title {
    font-size:17px;
    font-weight:600;
    margin-top:8px;
}

.highlight {
    background:yellow;
}

.desc {
    font-size:13px;
    color:#666;
    margin-top:6px;
}

.form {
    margin-top:4px;
    font-size:13px;
    color:#0a84ff;
}

/* BUTTON */
.btn {
    margin-top:12px;
    background:#0a84ff;
    color:white;
    padding:10px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
}

/* ZOOM */
.zoom-modal {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.zoom-modal img { max-width:90%; max-height:90%; }

.zoom-close {
    position:absolute;
    top:20px;
    right:20px;
    font-size:28px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Jurabek Laboratories 🧬</div>

<!-- TABS -->
<div class="tabs">
    <div class="tab active" onclick="setTab('all')" id="tab-all">Все</div>
    <div class="tab" onclick="setTab('fav')" id="tab-fav">Избранное</div>
</div>

<div class="top">
    <input id="search" placeholder="Поиск..." oninput="debounceSearch()">
    <div id="suggestions" class="suggestions"></div>
</div>

<div id="list"></div>

<!-- ZOOM -->
<div id="zoomModal" class="zoom-modal" onclick="closeZoom()">
    <span class="zoom-close">✕</span>
    <img id="zoomImg">
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let currentList = [...drugs];
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");
let debounceTimer = null;
let currentTab = "all";

// ===== TAB =====
function setTab(tab){
    currentTab = tab;

    document.getElementById("tab-all").classList.remove("active");
    document.getElementById("tab-fav").classList.remove("active");

    document.getElementById("tab-"+tab).classList.add("active");

    search();
}

// ===== FAVORITE =====
function toggleFav(name){
    if(favorites.includes(name)){
        favorites = favorites.filter(f=>f!==name);
    } else {
        favorites.push(name);
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
    search();
}

// ===== NORMALIZE =====
function norm(t){ return (t||"").toLowerCase().trim(); }

// ===== HIGHLIGHT =====
function highlight(text, q){
    if(!q) return text;
    let reg = new RegExp(`(${q})`, "gi");
    return text.replace(reg, `<span class="highlight">$1</span>`);
}

// ===== RENDER =====
function render(data){
    currentList = data;

    let q = norm(document.getElementById("search").value);

    let html = "";

    data.forEach((d,i)=>{
        let fav = favorites.includes(d.name);

        html += `
        <div class="card">

            <div class="fav" onclick="toggleFav('${d.name}')">
                ${fav ? "❤️" : "🤍"}
            </div>

            ${d.photo ? `<img src="${d.photo}">` : ''}

            <div class="title">${highlight(d.name, q)}</div>

            <div class="desc">${d.sostav || ''}</div>

            ${(d.form || d.dosage) ? `
                <div class="form">
                    ${d.form || ''} ${d.dosage ? '('+d.dosage+')' : ''}
                </div>
            ` : ''}

            <div class="btn" onclick="openDrug(${i})">Открыть</div>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

// ===== SEARCH =====
function search(){
    let q = norm(document.getElementById("search").value);
    document.getElementById("suggestions").innerHTML = "";

    let base = currentTab === "fav"
        ? drugs.filter(d=>favorites.includes(d.name))
        : drugs;

    if(!q){
        render(base);
        return;
    }

    let result = base.filter(d=>{
        return norm(d.name).includes(q) ||
               norm(d.indications).includes(q);
    });

    render(result);
    showSuggestions(q);
}

// ===== SUGGESTIONS =====
function showSuggestions(q){
    let list = drugs
        .filter(d=>norm(d.name).includes(q))
        .slice(0,5);

    let html = list.map(d =>
        `<div class="suggestion" onclick="selectSuggestion('${d.name}')">${d.name}</div>`
    ).join("");

    document.getElementById("suggestions").innerHTML = html;
}

function selectSuggestion(text){
    document.getElementById("search").value = text;
    document.getElementById("suggestions").innerHTML = "";
    search();
}

// ===== DEBOUNCE =====
function debounceSearch(){
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(search, 200);
}

// ===== OPEN =====
function openDrug(i){
    let d = currentList[i];

    document.getElementById("list").innerHTML = `
    <div class="card">
        ${d.photo ? `<img src="${d.photo}" class="big-img" onclick="openZoom('${d.photo}')">` : ''}
        <div class="title">${d.name}</div>
        <div class="desc">
            <b>Состав:</b><br>${d.sostav || '-'}<br><br>
            <b>Форма:</b><br>${d.form || ''} (${d.dosage || ''})<br><br>
            <b>Показания:</b><br>${d.indications || '-'}
        </div>
        <div class="btn" onclick="search()">← Назад</div>
    </div>`;
}

// ===== ZOOM =====
function openZoom(src){
    document.getElementById("zoomImg").src = src;
    document.getElementById("zoomModal").style.display = "flex";
}
function closeZoom(){
    document.getElementById("zoomModal").style.display = "none";
}

// ===== START =====
render(drugs);

</script>

</body>
</html>

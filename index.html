<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Каталог</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    background: #f2f2f2;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 12px;
}

h3 { text-align: center; }

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin: 10px 0;
}

/* адаптив */
#list {
    display: grid;
    gap: 12px;
}

@media (max-width: 600px) {
    #list { grid-template-columns: 1fr; }
}
@media (min-width: 601px) and (max-width: 900px) {
    #list { grid-template-columns: 1fr 1fr; }
}
@media (min-width: 901px) {
    #list { grid-template-columns: 1fr 1fr 1fr; }
}

.card {
    background: white;
    border-radius: 16px;
    padding: 10px;
    text-align: center;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    height: 230px;

    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.photo {
    width: 100%;
    height: 100px;
    object-fit: contain;
}

.name {
    font-weight: bold;
    font-size: 14px;
}

.info {
    font-size: 12px;
    color: #666;

    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
}

button {
    width: 90%;
    margin: 0 auto;
    padding: 8px;
    border-radius: 10px;
    border: none;
    background: #2ea6ff;
    color: white;
}

.card-full {
    background: white;
    border-radius: 16px;
    padding: 14px;
}

.card-full img {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
}

.btn-group {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.btn-secondary { background: #4caf50; }
.back-btn { background: #ddd; color: black; }

#zoomModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
}

#zoomImg {
    max-width: 90%;
    max-height: 90%;
}
</style>
</head>

<body>

<div class="container">

<h3>💊 Каталог</h3>

<input id="search" placeholder="Поиск по названию или симптомам...">

<div id="list"></div>
<div id="cardView" style="display:none;"></div>

</div>

<div id="zoomModal" onclick="closeZoom()">
    <img id="zoomImg">
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let currentDrug = null;
let scrollPosition = 0;
let lastSearch = "";

/* TELEGRAM BACK */
tg.BackButton.show();
tg.BackButton.onClick(() => goBack());

/* ПОИСК */
document.getElementById("search").addEventListener("input", e => {
    lastSearch = e.target.value.toLowerCase();
    applySearch();
});

/* ПРИМЕНЕНИЕ ПОИСКА */
function applySearch() {
    const q = lastSearch;

    if (!q) {
        render(drugs);
        return;
    }

    const filtered = drugs.filter(d => {
        const text = `${d.name} ${d.indications} ${d.sostav}`.toLowerCase();
        return text.includes(q);
    });

    render(filtered);
}

/* РЕНДЕР */
function render(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(d => {
        list.innerHTML += `
        <div class="card">
            <img src="${d.photo}" class="photo">
            <div class="name">${d.name}</div>
            <div class="info">${d.sostav}<br>${d.form}</div>
            <button onclick="openCard('${d.name}')">Открыть</button>
        </div>
        `;
    });
}

/* ОТКРЫТЬ */
function openCard(name) {
    const d = drugs.find(x => x.name === name);
    currentDrug = d;

    scrollPosition = window.scrollY;

    history.pushState({
        page: "card",
        scroll: scrollPosition,
        search: lastSearch
    }, "");

    document.getElementById("list").style.display = "none";
    document.getElementById("search").style.display = "none";

    const view = document.getElementById("cardView");
    view.style.display = "block";

    view.innerHTML = `
        <div class="card-full">
            <img src="${d.photo}" onclick="zoomImage('${d.photo}')">

            <h3>${d.name}</h3>

            <p><b>Состав:</b> ${d.sostav}</p>
            <p><b>Форма:</b> ${d.form}</p>
            <p><b>Дозировка:</b> ${d.dosage}</p>
            <p><b>Группа:</b> ${d.group}</p>

            <p><b>Показания:</b></p>
            ${formatIndications(d.indications)}

            <div class="btn-group">
                <button onclick="selectDrug('${d.name}')">Выбрать</button>
                <button class="btn-secondary" onclick="window.open('${d.url}')">🌐 Сайт</button>
                <button class="back-btn" onclick="goBack()">⬅️ Назад</button>
            </div>
        </div>
    `;
}

/* НАЗАД */
function goBack() {
    document.getElementById("cardView").style.display = "none";
    document.getElementById("list").style.display = "grid";
    document.getElementById("search").style.display = "block";

    // восстановление поиска
    document.getElementById("search").value = lastSearch;
    applySearch();

    // восстановление позиции
    setTimeout(() => {
        window.scrollTo(0, scrollPosition);
    }, 50);
}

/* HISTORY BACK */
window.onpopstate = function (event) {
    if (event.state && event.state.page === "card") {
        lastSearch = event.state.search || "";
        scrollPosition = event.state.scroll || 0;
        goBack();
    }
};

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX < 50 && endX > startX + 80) {
        goBack();
    }
});

/* ПОКАЗАНИЯ */
function formatIndications(text) {
    if (!text) return "<p>—</p>";

    let items = text.split(";").filter(i => i.trim());
    return "<ul>" + items.map(i => `<li>${i}</li>`).join("") + "</ul>";
}

/* ZOOM */
function zoomImage(src) {
    document.getElementById("zoomImg").src = src;
    document.getElementById("zoomModal").style.display = "flex";
}

function closeZoom() {
    document.getElementById("zoomModal").style.display = "none";
}

/* SEND */
function selectDrug(name) {
    tg.sendData(JSON.stringify({name}));
}

/* INIT */
render(drugs);
</script>

</body>
</html>

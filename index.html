<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аптечный AI</title>

<script src="data.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

.top {
    display: flex;
    gap: 10px;
    padding: 10px;
    position: sticky;
    top: 0;
    background: white;
    z-index: 10;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: black;
    color: white;
    cursor: pointer;
}

#list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 10px;
}

.card {
    background: white;
    border-radius: 14px;
    padding: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: contain;
    cursor: pointer;
}

.title {
    font-weight: bold;
    margin-top: 5px;
}

.ind {
    font-size: 13px;
    color: #555;
    max-height: 40px;
    overflow: hidden;
}

/* zoom */
.modal {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal img {
    max-width:90%;
    max-height:90%;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="top">
    <input id="search" placeholder="Введите симптомы или название">
    <button onclick="askAI()">AI</button>
    <button onclick="showAll()">Все</button>
</div>

<div id="list"></div>

<div id="imgModal" class="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>

// --------------------
// РЕНДЕР
// --------------------
function render(data){
    let html = "";

    data.forEach(d=>{
        html += `
        <div class="card">
            ${d.photo ? `<img src="${d.photo}" onclick="openModal('${d.photo}')">` : ''}
            <div class="title">${d.name}</div>
            <div class="ind">${d.indications || ''}</div>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

// --------------------
// ПОКАЗ ВСЕХ
// --------------------
function showAll(){
    document.getElementById("search").value = "";
    render(drugs);
}

// --------------------
// AI ПОИСК (ТОЛЬКО ПО КНОПКЕ)
// --------------------
async function askAI(){
    try{
        let q = document.getElementById("search").value;

        if (!q.trim()) {
            alert("Введите запрос");
            return;
        }

        let res = await fetch("http://127.0.0.1:5000/ai", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ query: q })
        });

        let data = await res.json();

        console.log("AI:", data);

        if (!data.drugs) {
            alert("Ошибка AI");
            return;
        }

        let result = drugs.filter(d =>
            data.drugs.some(name =>
                name.toLowerCase() === d.name.toLowerCase()
            )
        );

        if (result.length === 0) {
            document.getElementById("list").innerHTML =
                "<p>Ничего не найдено</p>";
            return;
        }

        render(result);

    } catch(e){
        console.error("Ошибка:", e);
        alert("Ошибка AI");
    }
}

// --------------------
// ZOOM
// --------------------
function openModal(src){
    document.getElementById("imgModal").style.display = "flex";
    document.getElementById("modalImg").src = src;
}

function closeModal(){
    document.getElementById("imgModal").style.display = "none";
}

// --------------------
// СТАРТ (ТОЛЬКО ВСЕ ПРЕПАРАТЫ)
// --------------------
render(drugs);

</script>

</body>
</html>

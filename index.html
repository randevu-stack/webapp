<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system, Arial;
    background:#f2f2f7;
    max-width:1200px;
    margin:auto;
}

/* HEADER */
.header {
    background:#f4f4f4;
    padding:12px;
    border-bottom:1px solid #ddd;
}

.header-top {
    display:flex;
    align-items:center;
    gap:10px;
}

.logo { width:42px;height:42px; }

.brand {
    font-weight:700;
    color:#1f4fa3;
    line-height:1.2;
}

.sub { font-size:11px;color:#666; }

.contacts { margin-top:8px;font-size:12px; }
.contact { display:flex; gap:6px; }

/* SEARCH */
.top { padding:10px; }

input {
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#e9e9ee;
}

/* GRID */
#list {
    display:grid;
    gap:14px;
    padding:10px;
}

@media (min-width:600px){
    #list { grid-template-columns:repeat(2,1fr); }
}

@media (min-width:1024px){
    #list { grid-template-columns:repeat(3,1fr); }
}

/* CARD */
.card {
    background:white;
    border-radius:18px;
    padding:12px;
    box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

.card img {
    width:100%;
    height:150px;
    object-fit:contain;
    background:#f7f7f7;
    border-radius:12px;
}

.big-img {
    width:100%;
    height:220px;
    object-fit:contain;
    background:#f7f7f7;
    border-radius:12px;
}

.title { font-weight:600;margin-top:8px; }
.desc { font-size:13px;color:#666;margin-top:6px; }
.form { margin-top:4px;color:#0a84ff;font-size:13px; }

.btn {
    margin-top:10px;
    background:#0a84ff;
    color:white;
    padding:10px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
}

.btn.green { background:#34c759; }

.empty { padding:30px;text-align:center;color:#888; }
</style>
</head>

<body>

<div class="header">
    <div class="header-top">
        <img src="logo.png" class="logo">
        <div>
            <div class="brand">JURABEK<br>Laboratories LTD</div>
            <div class="sub">Производство лекарственных средств широкого спектра</div>
        </div>
    </div>

    <div class="contacts">
        <div class="contact">📞 +998 (78) 150-03-03</div>
        <div class="contact">✉️ info@jurabek.uz</div>
        <div class="contact">📅 Пн–Пт 9:00–18:00</div>
    </div>
</div>

<div class="top">
    <input id="search" placeholder="Поиск..." oninput="search()">
</div>

<div id="list"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let isDetailOpen=false;
let scrollPos=0;
let currentList=[...drugs];

function norm(t){return (t||"").toLowerCase();}

/* ===== GET PARAM ===== */
function getParam(){
    const params = new URLSearchParams(window.location.search);
    return params.get("drug");
}

/* ===== ПОИСК ===== */
function search(){
    isDetailOpen=false;
    tg.BackButton.hide();

    let q = norm(document.getElementById("search").value);

    if(!q){ render(drugs); return; }

    let res = drugs.filter(d=>{
        return norm(d.name + d.indications + d.sostav).includes(q);
    });

    render(res);
}

/* ===== РЕНДЕР ===== */
function render(data){
    currentList=data;

    if(data.length===0){
        document.getElementById("list").innerHTML =
        `<div class="empty">Ничего не найдено</div>`;
        return;
    }

    let html="";

    data.forEach((d,i)=>{
        html+=`
        <div class="card">

            ${d.photo?`<img src="${d.photo}" loading="lazy">`:''}

            <div class="title">${d.name}</div>

            ${(d.form||d.dosage)?`
            <div class="form">
                ${d.form||''} ${d.dosage ? '('+d.dosage+')' : ''}
            </div>`:''}

            <div class="btn" onclick="openDrug(${i})">Открыть</div>

        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

/* ===== ОТКРЫТИЕ ===== */
function openDrug(i){
    let d = currentList[i];

    scrollPos = window.scrollY;
    isDetailOpen = true;
    tg.BackButton.show();

    document.getElementById("list").innerHTML = `
    <div class="card">

        ${d.photo?`<img src="${d.photo}" class="big-img">`:''}

        <div class="title">${d.name}</div>

        <div class="desc">
            <b>Состав:</b><br>${d.sostav||'-'}<br><br>

            <b>Форма:</b><br>
            ${d.form || '-'} ${d.dosage ? '(' + d.dosage + ')' : ''}<br><br>

            <b>Показания:</b><br>
            ${d.indications||'-'}
        </div>

        <div class="btn" onclick="goBack()">← Назад</div>

        ${d.url?`
        <div class="btn green" onclick="tg.openLink('${d.url}')">
            🌐 Открыть сайт
        </div>`:''}

        <div class="btn" onclick="shareDeepLink('${d.name}')">
            📤 Поделиться
        </div>

    </div>`;
}

/* ===== SHARE ===== */
function shareDeepLink(name){
    let bot = "jurabek_helper_bot";
    let link = `https://t.me/${bot}?start=drug_${encodeURIComponent(name)}`;
    let url = `https://t.me/share/url?url=${encodeURIComponent(link)}`;
    tg.openLink(url);
}

/* ===== НАЗАД ===== */
function goBack(){
    isDetailOpen=false;
    tg.BackButton.hide();
    search();
    setTimeout(()=>window.scrollTo(0,scrollPos),0);
}

/* ===== AUTO OPEN (НЕ ЛОМАЕТ UI) ===== */
function autoOpen(){
    let key = getParam();
    if(!key) return;

    let index = drugs.findIndex(d => norm(d.name) === norm(key));
    if(index !== -1){
        openDrug(index);
    }
}

tg.BackButton.onClick(()=>{
    if(isDetailOpen) goBack();
});

/* СТАРТ */
render(drugs);
autoOpen();
</script>

</body>
</html>

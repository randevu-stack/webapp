<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurabek Laboratories</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body {margin:0;font-family:-apple-system,Arial;background:#f2f2f7;max-width:1200px;margin:auto;}

.header{background:#f4f4f4;padding:12px;border-bottom:1px solid #ddd;}
.header-top{display:flex;align-items:center;gap:10px;}
.logo{width:42px;}
.brand{font-weight:700;color:#1f4fa3;}
.sub{font-size:11px;color:#666;}

.contacts{margin-top:8px;font-size:12px;}
.contact{display:flex;gap:6px;}

.tabs{display:flex;gap:8px;padding:10px;}
.tab{flex:1;padding:10px;border-radius:10px;background:#e9e9ee;text-align:center;cursor:pointer;}
.tab.active{background:#0a84ff;color:white;}

.top{padding:10px;}
input{width:100%;padding:12px;border-radius:12px;border:none;background:#e9e9ee;}

#list{display:grid;gap:14px;padding:10px;}
@media(min-width:600px){#list{grid-template-columns:repeat(2,1fr);}}
@media(min-width:1024px){#list{grid-template-columns:repeat(3,1fr);}}

.card{background:white;border-radius:18px;padding:12px;box-shadow:0 4px 18px rgba(0,0,0,0.08);}
.title{font-weight:600;margin-top:8px;}
.desc{font-size:13px;color:#666;margin-top:6px;}

.btn{margin-top:10px;background:#0a84ff;color:white;padding:10px;text-align:center;border-radius:12px;cursor:pointer;}
.btn.green{background:#34c759;}
.btn.gray{background:#8e8e93;}
</style>
</head>

<body>

<div class="header">
    <div class="header-top">
        <img src="logo.png" class="logo">
        <div>
            <div class="brand">JURABEK<br>Laboratories LTD</div>
            <div class="sub">Производство лекарственных средств</div>
        </div>
    </div>

    <div class="contacts">
        <div class="contact">📞 +998 (78) 150-03-03</div>
        <div class="contact">✉️ info@jurabek.uz</div>
        <div class="contact">📅 Пн–Пт 9:00–18:00</div>
    </div>
</div>

<div class="top">
    <input id="search" placeholder="Поиск..." oninput="search()">
</div>

<div id="list"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let currentList = [...drugs];

function norm(t){return (t||"").toLowerCase();}

function search(){
    let q = norm(document.getElementById("search").value);

    if(!q){ render(drugs); return; }

    let res = drugs.filter(d=>{
        return norm(d.name + d.indications + d.sostav).includes(q);
    });

    render(res);
}

function render(data){
    currentList = data;

    let html="";
    data.forEach((d,i)=>{
        html+=`
        <div class="card">
            ${d.photo?`<img src="${d.photo}" style="width:100%">`:''}
            <div class="title">${d.name}</div>
            <div class="desc">${d.sostav||''}</div>
            <div class="btn" onclick="openDrug(${i})">Открыть</div>
        </div>`;
    });

    document.getElementById("list").innerHTML=html;
}

function openDrug(i){
    let d = currentList[i];

    document.getElementById("list").innerHTML=`
    <div class="card">
        ${d.photo?`<img src="${d.photo}" style="width:100%">`:''}
        <div class="title">${d.name}</div>

        <div class="desc">
        <b>Состав:</b><br>${d.sostav||'-'}<br><br>
        <b>Показания:</b><br>${d.indications||'-'}
        </div>

        <div class="btn" onclick="search()">← Назад</div>

        ${d.url?`
        <div class="btn green" onclick="tg.openLink('${d.url}')">
        🌐 Открыть сайт
        </div>`:''}

        <div class="btn gray" onclick='shareViaBot(${JSON.stringify(d)})'>
        📤 Поделиться через бота
        </div>
    </div>`;
}

/* 🔥 ШАРИНГ ЧЕРЕЗ БОТА */
function shareViaBot(d){
    tg.sendData(JSON.stringify({
        type:"share",
        drug:d
    }));

    tg.close(); // закрываем WebApp после отправки
}

render(drugs);
</script>

</body>
</html>

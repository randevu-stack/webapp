<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body{margin:0;font-family:-apple-system,Arial;background:#f2f2f7;}

.header{background:#f4f4f4;padding:12px;border-bottom:1px solid #ddd;}
.header-top{display:flex;gap:10px;align-items:center;}
.logo{width:42px;}
.brand{font-weight:700;color:#000;}
.sub{font-size:11px;color:#666;}
.contacts{margin-top:6px;font-size:12px;color:#666;}
.contacts a{color:#0a84ff;text-decoration:none;}

.top{padding:10px;}
input{width:100%;padding:12px;border:none;border-radius:12px;background:#e9e9ee;}

.tabs{display:flex;gap:10px;padding:10px;}
.tab{flex:1;text-align:center;padding:10px;background:#e9e9ee;border-radius:10px;}
.tab.active{background:#0a84ff;color:white;}

#list{display:grid;gap:14px;padding:10px;}

.card{background:white;border-radius:18px;padding:12px;box-shadow:0 4px 18px rgba(0,0,0,0.08);}
.card img{width:100%;height:150px;object-fit:contain;background:#f7f7f7;border-radius:12px;}
.big-img{height:220px;cursor:pointer;}

.title{font-weight:700;margin-top:8px;color:#000;}
.form{font-size:13px;color:#000;margin-top:4px;}

.detail-block{margin-top:10px;font-size:13px;color:#666;}
.detail-block b{display:block;color:#000;margin-bottom:2px;}

.fav{
position:absolute;top:8px;right:8px;width:34px;height:34px;
border-radius:50%;display:flex;align-items:center;justify-content:center;
font-size:18px;cursor:pointer;background:rgba(255,255,255,0.6);
}
.fav.active{color:#ff3b30;}

.btn{margin-top:10px;background:#0a84ff;color:white;padding:10px;border-radius:12px;text-align:center;cursor:pointer;}
.btn.green{background:#34c759;}

.zoom{
position:fixed;top:0;left:0;width:100%;height:100%;
background:black;display:flex;align-items:center;justify-content:center;
z-index:9999;
}
.zoom-close{
position:absolute;top:20px;right:20px;font-size:28px;color:white;cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-top">
        <img src="logo.png" class="logo">
        <div>
            <div class="brand">JURABEK Laboratories</div>
            <div class="sub">Производство лекарственных средств широкого спектра</div>
        </div>
    </div>

    <div class="contacts">
        📞 <a href="tel:+998781500303">+998 (78) 150-03-03</a><br>
        ✉️ <a href="mailto:info@jurabek.uz">info@jurabek.uz</a><br>
        📅 Пн–Пт 09:00–18:00
    </div>
</div>

<div class="top" id="searchBlock">
    <input id="search" placeholder="Поиск по товарам и симптомам..." oninput="search()">
</div>

<div class="tabs" id="tabs">
    <div class="tab active" onclick="switchTab('all', this)">Товары</div>
    <div class="tab" onclick="switchTab('fav', this)">Избранное</div>
</div>

<div id="list"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let isDetailOpen = false;
let isZoomOpen = false;
let currentTab = "all";
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

let scrollPos = 0;
let searchQuery = "";
let touchStartX = 0;

/* SWIPE */
document.addEventListener("touchstart", e=>{
    touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", e=>{
    let diff = touchStartX - e.changedTouches[0].screenX;

    if(diff > 80){

        if(isZoomOpen){
            closeZoom();
            return;
        }

        if(isDetailOpen){
            goBack();
            return;
        }

        if(searchQuery){
            searchQuery = "";
            document.getElementById("search").value = "";
            render(getBase());
            window.scrollTo(0,0);
        }
    }
});

/* SEARCH */
function norm(t){ return (t||"").toLowerCase(); }

function getBase(){
    if(currentTab==="all") return drugs;
    return drugs.filter(d=>favorites.includes(d.name));
}

function search(){
    searchQuery = document.getElementById("search").value;

    let q = norm(searchQuery);
    let base = getBase();

    if(!q){
        render(base);
        if(!isDetailOpen) tg.BackButton.hide();
        return;
    }

    let res = base.filter(d=>{
        let text = norm(d.name + " " + d.indications);
        return text.includes(q);
    });

    render(res);

    if(!isDetailOpen) tg.BackButton.show();
}

/* TABS */
function switchTab(tab, el){
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");

    document.getElementById("search").value = "";
    searchQuery = "";

    tg.BackButton.hide();
    render(getBase());
}

/* RENDER */
function render(data){
    let html = "";

    data.forEach(d=>{
        html += `
        <div class="card">
            <div style="position:relative">
                <img src="${d.photo}">
                <div class="fav ${favorites.includes(d.name)?'active':''}"
                    onclick="toggleFav('${d.name}')">
                    ${favorites.includes(d.name)?'❤':'♡'}
                </div>
            </div>

            <div class="title">${d.name}</div>

            ${(d.form || d.dosage) ? `
            <div class="form">
                ${d.form || ''} ${d.dosage ? '('+d.dosage+')' : ''}
            </div>` : ''}

            <div class="btn" onclick="openDrug('${d.name}')">Открыть</div>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

/* OPEN */
function openDrug(name){
    let d = drugs.find(x=>norm(x.name)===norm(name));

    scrollPos = window.scrollY;

    isDetailOpen = true;
    tg.BackButton.show();

    document.getElementById("tabs").style.display = "none";
    document.getElementById("searchBlock").style.display = "none";

    document.getElementById("list").innerHTML = `
    <div class="card">

        <img src="${d.photo}" class="big-img" onclick="zoom('${d.photo}')">

        <div class="title">${d.name}</div>

        <div class="detail-block"><b>Форма</b>${d.form || '-'}</div>
        <div class="detail-block"><b>Дозировка</b>${d.dosage || '-'}</div>
        <div class="detail-block"><b>Состав</b>${d.sostav || '-'}</div>
        <div class="detail-block"><b>Показания</b>${d.indications || '-'}</div>

        <div class="btn green" onclick="openSite('${d.url || ''}')">🌐 Открыть сайт</div>
        <div class="btn" onclick="goBack()">← Назад</div>

    </div>`;
}

/* BACK BUTTON */
tg.BackButton.onClick(()=>{
    if(isZoomOpen){
        closeZoom();
        return;
    }

    if(isDetailOpen){
        goBack();
        return;
    }

    if(searchQuery){
        searchQuery = "";
        document.getElementById("search").value = "";
        render(getBase());
        window.scrollTo(0,0);
        tg.BackButton.hide();
    }
});

/* BACK */
function goBack(){
    isDetailOpen = false;

    document.getElementById("tabs").style.display = "flex";
    document.getElementById("searchBlock").style.display = "block";

    document.getElementById("search").value = searchQuery;
    search();

    setTimeout(()=>window.scrollTo(0, scrollPos), 0);
}

/* SITE */
function openSite(url){
    if(!url) return;
    if(!url.startsWith("http")) url = "https://" + url;
    tg.openLink(url);
}

/* ZOOM */
function zoom(src){
    isZoomOpen = true;

    document.body.insertAdjacentHTML("beforeend", `
        <div class="zoom" onclick="closeZoom()">
            <div class="zoom-close" onclick="event.stopPropagation(); closeZoom()">✕</div>
            <img src="${src}" style="max-width:90%">
        </div>
    `);
}

function closeZoom(){
    isZoomOpen = false;
    document.querySelector(".zoom")?.remove();
}

/* FAV */
function toggleFav(name){
    if(favorites.includes(name)){
        favorites = favorites.filter(x=>x!==name);
    }else{
        favorites.push(name);
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
    search();
}

/* START */
render(getBase());
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Каталог препаратов</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="data.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 10px;
            background: #f5f5f5;
            margin: 0;
        }

        h3 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .photo {
            width: 100%;
            max-width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            margin: 0 auto 8px;
            display: block;
        }

        .name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .info {
            font-size: 13px;
            color: #555;
        }

        button {
            margin-top: 5px;
            padding: 8px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #2ea6ff;
            color: white;
            cursor: pointer;
        }

        .btn-secondary {
            background: #4caf50;
        }

        #cardView {
            display: none;
        }

        .card-full {
            background: white;
            padding: 15px;
            border-radius: 12px;
        }

        .card-full img {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .back-btn {
            background: #ccc;
            color: black;
            margin-bottom: 10px;
        }

        ul {
            padding-left: 20px;
            text-align: left;
        }

        li {
            margin-bottom: 6px;
        }

        .section-title {
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 5px;
            text-align: left;
        }
    </style>
</head>

<body>

<h3>💊 Каталог</h3>

<input type="text" id="search" placeholder="Поиск...">

<div id="list"></div>
<div id="cardView"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ======================
    // 🧠 ФОРМАТ ПОКАЗАНИЙ
    // ======================
    function formatIndications(text) {
    if (!text) return "<p>—</p>";

    text = text.trim();

    // разбиваем по блокам 1. 2. 3.
    let sections = text.split(/\n?\d+\.\s/).filter(s => s.trim());

    // если нет нумерации → обычный режим
    if (sections.length === 1) {
        return simpleFormat(text);
    }

    let result = "";

    sections.forEach((section, index) => {
        let parts = section.split(":");

        let title = parts[0].trim();
        let body = parts.slice(1).join(":").trim();

        let items = body.split(";")
            .map(i => i.trim())
            .filter(i => i.length > 0);

        result += `
            <div class="block">
                <p class="section-title">${index + 1}. ${title}:</p>
                <ul>${items.map(i => `<li>${i}</li>`).join("")}</ul>
            </div>
        `;
    });

    return result;
}

// простой формат (если нет 1. 2.)
function simpleFormat(text) {
    if (text.includes(":")) {
        let parts = text.split(":");
        let title = parts[0].trim();
        let body = parts.slice(1).join(":").trim();

        if (body.includes(";")) {
            let items = body.split(";")
                .map(i => i.trim())
                .filter(i => i.length > 0);

            return `
                <p class="section-title">${title}:</p>
                <ul>${items.map(i => `<li>${i}</li>`).join("")}</ul>
            `;
        }

        return `<p><b>${title}:</b> ${body}</p>`;
    }

    if (text.includes(";")) {
        let items = text.split(";")
            .map(i => i.trim())
            .filter(i => i.length > 0);

        return "<ul>" + items.map(i => `<li>${i}</li>`).join("") + "</ul>";
    }

    return `<p>${text}</p>`;
}

    // ======================
    // 📦 СПИСОК
    // ======================
    function render(data) {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(d => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="${d.photo}" class="photo">

                <div class="name">${d.name}</div>

                <div class="info">
                    🧬 ${d.sostav}<br>
                    💊 ${d.form} (${d.dosage})
                </div>

                <button onclick="openCard('${d.name}')">
                    Открыть
                </button>
            `;

            list.appendChild(div);
        });
    }

    // ======================
    // 📖 КАРТОЧКА
    // ======================
    function openCard(name) {
        const d = drugs.find(x => x.name === name);
        if (!d) return;

        document.getElementById("list").style.display = "none";
        document.getElementById("search").style.display = "none";

        const view = document.getElementById("cardView");
        view.style.display = "block";

        view.innerHTML = `
            <button class="back-btn" onclick="goBack()">⬅️ Назад</button>

            <div class="card-full">
                <img src="${d.photo}">

                <h3>${d.name}</h3>

                <p><b>🧬 Состав:</b> ${d.sostav}</p>
                <p><b>💊 Форма:</b> ${d.form}</p>
                <p><b>📦 Дозировка:</b> ${d.dosage}</p>
                <p><b>🏥 Группа:</b> ${d.group}</p>

                <p><b>🤒 Показания:</b></p>
                ${formatIndications(d.indications)}

                <button onclick="selectDrug('${d.name}')">
                    Выбрать
                </button>

                <button class="btn-secondary" onclick="openLink('${d.url}')">
                    🌐 Сайт
                </button>
            </div>
        `;
    }

    // ======================
    // 🔙 НАЗАД
    // ======================
    function goBack() {
        document.getElementById("cardView").style.display = "none";
        document.getElementById("list").style.display = "grid";
        document.getElementById("search").style.display = "block";

        const q = document.getElementById("search").value.toLowerCase();

        const filtered = drugs.filter(d =>
            d.name.toLowerCase().includes(q) ||
            d.indications.toLowerCase().includes(q) ||
            d.group.toLowerCase().includes(q)
        );

        render(filtered);
    }

    // ======================
    // 📤 В БОТА
    // ======================
    function selectDrug(name) {
        tg.sendData(JSON.stringify({
            action: "select",
            name: name
        }));
    }

    // ======================
    // 🌐 САЙТ
    // ======================
    function openLink(url) {
        window.open(url, "_blank");
    }

    // ======================
    // 🔍 ПОИСК
    // ======================
    document.getElementById("search").addEventListener("input", (e) => {
        const q = e.target.value.toLowerCase();

        const filtered = drugs.filter(d =>
            d.name.toLowerCase().includes(q) ||
            d.indications.toLowerCase().includes(q) ||
            d.group.toLowerCase().includes(q)
        );

        render(filtered);
    });

    // старт
    render(drugs);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurabek Laboratories</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body {margin:0;font-family:-apple-system,Arial;background:#f2f2f7;max-width:1200px;margin:auto;}
.header {padding:14px;font-size:18px;font-weight:600;}

.tabs {display:flex;gap:10px;padding:10px;}
.tab {flex:1;padding:10px;border-radius:10px;background:#e9e9ee;text-align:center;cursor:pointer;}
.tab.active {background:#0a84ff;color:white;}

.top {padding:10px;}
input {width:100%;padding:12px;border-radius:12px;border:none;background:#e9e9ee;}

#list {display:grid;gap:14px;padding:10px;grid-template-columns:1fr;}
@media (min-width:600px){#list{grid-template-columns:repeat(2,1fr);}}
@media (min-width:1024px){#list{grid-template-columns:repeat(3,1fr);}}

.card {background:white;border-radius:18px;padding:12px;box-shadow:0 4px 18px rgba(0,0,0,0.08);position:relative;}
.fav {position:absolute;right:12px;top:10px;font-size:20px;cursor:pointer;}

.card img {width:100%;height:150px;object-fit:contain;background:#f7f7f7;border-radius:12px;}

.title {font-size:17px;font-weight:600;margin-top:8px;}
.desc {font-size:13px;color:#666;margin-top:6px;}
.form {margin-top:4px;color:#0a84ff;font-size:13px;}

.btn {margin-top:12px;background:#0a84ff;color:white;padding:10px;text-align:center;border-radius:12px;cursor:pointer;}

.empty {padding:30px;text-align:center;color:#888;}
.recent-title {padding:10px;font-weight:600;color:#555;}
</style>
</head>

<body>

<div class="header">Jurabek Laboratories 🧬</div>

<div class="tabs">
    <div class="tab active" id="tab-all" onclick="setTab('all')">Все</div>
    <div class="tab" id="tab-fav" onclick="setTab('fav')">Избранное</div>
</div>

<div class="top">
    <input id="search" placeholder="Поиск по названию и симптомам..." oninput="debounceSearch()">
</div>

<div id="recent"></div>
<div id="list"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let favorites = JSON.parse(localStorage.getItem("fav") || "[]");
let recent = JSON.parse(localStorage.getItem("recent") || "[]");
let currentTab = "all";
let currentList = [...drugs];
let debounceTimer = null;

// ===== СИНОНИМЫ =====
const synonyms = {
    "сердце": ["кардио", "ишемия", "стенокардия"],
    "боль": ["болит", "болевой"]
};

// ===== TAB =====
function setTab(tab){
    currentTab = tab;
    document.getElementById("tab-all").classList.remove("active");
    document.getElementById("tab-fav").classList.remove("active");
    document.getElementById("tab-"+tab).classList.add("active");
    search();
}

// ===== FAVORITES =====
function toggleFav(name){
    if(favorites.includes(name)){
        favorites = favorites.filter(f=>f!==name);
    } else {
        favorites.push(name);
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
    search();
}

// ===== NORMALIZE =====
function norm(t){ return (t||"").toLowerCase().trim(); }

// ===== УМНЫЙ ПОИСК =====
function expandQuery(q){
    let words = q.split(" ").filter(Boolean);
    let expanded = [...words];

    words.forEach(w=>{
        if(synonyms[w]){
            expanded.push(...synonyms[w]);
        }
    });

    return expanded;
}

// ===== SEARCH =====
function search(){
    let q = norm(document.getElementById("search").value);

    let base = currentTab === "fav"
        ? drugs.filter(d=>favorites.includes(d.name))
        : drugs;

    if(!q){
        render(base);
        showRecent();
        return;
    }

    let expandedWords = expandQuery(q);

    let result = base.filter(d=>{
        let text = norm(d.name + " " + d.indications);

        return expandedWords.some(word => text.includes(word));
    });

    render(result);
    document.getElementById("recent").innerHTML = "";
}

// ===== RECENT =====
function addRecent(name){
    recent = recent.filter(r=>r!==name);
    recent.unshift(name);
    recent = recent.slice(0,5);
    localStorage.setItem("recent", JSON.stringify(recent));
}

function showRecent(){
    if(recent.length === 0) return;

    let items = recent
        .map(name => drugs.find(d=>d.name === name))
        .filter(Boolean);

    let html = `<div class="recent-title">Недавно просмотренные</div>`;

    items.forEach(d=>{
        html += `<div class="card">
            <div class="title">${d.name}</div>
            <div class="btn" onclick="openDrugByName('${d.name}')">Открыть</div>
        </div>`;
    });

    document.getElementById("recent").innerHTML = html;
}

// ===== RENDER =====
function render(data){
    currentList = data;

    if(currentTab === "fav" && favorites.length === 0){
        document.getElementById("list").innerHTML =
        `<div class="empty">У вас пока нет избранных ❤️</div>`;
        return;
    }

    if(data.length === 0){
        document.getElementById("list").innerHTML =
        `<div class="empty">Ничего не найдено</div>`;
        return;
    }

    let html = "";

    data.forEach((d,i)=>{
        let fav = favorites.includes(d.name);

        html += `
        <div class="card">
            <div class="fav" onclick="toggleFav('${d.name}')">
                ${fav ? "❤️" : "🤍"}
            </div>

            ${d.photo ? `<img src="${d.photo}" loading="lazy">` : ''}

            <div class="title">${d.name}</div>

            <div class="desc">${d.sostav || ''}</div>

            ${(d.form || d.dosage) ? `
                <div class="form">
                    ${d.form || ''} (${d.dosage || ''})
                </div>` : ''}

            <div class="btn" onclick="openDrug(${i})">Открыть</div>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

// ===== OPEN =====
function openDrug(i){
    let d = currentList[i];
    addRecent(d.name);

    document.getElementById("recent").innerHTML = "";

    document.getElementById("list").innerHTML = `
    <div class="card">
        ${d.photo ? `<img src="${d.photo}">` : ''}
        <div class="title">${d.name}</div>
        <div class="desc">
            <b>Состав:</b><br>${d.sostav || '-'}<br><br>
            <b>Форма:</b><br>${d.form || ''} (${d.dosage || ''})<br><br>
            <b>Показания:</b><br>${d.indications || '-'}
        </div>
        <div class="btn" onclick="search()">← Назад</div>
    </div>`;
}

function openDrugByName(name){
    let d = drugs.find(x=>x.name === name);
    if(!d) return;

    currentList = [d];
    openDrug(0);
}

// ===== DEBOUNCE =====
function debounceSearch(){
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(search, 200);
}

// ===== START =====
search();

</script>

</body>
</html>

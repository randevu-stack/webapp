<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Каталог препаратов</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 10px;
            background: #f5f5f5;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        .card {
            background: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            width: 100%;
        }
    </style>
</head>

<body>

<h3>💊 Каталог</h3>

<input type="text" id="search" placeholder="Поиск...">

<div id="list"></div>

<script src="data.js"></script>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let filtered = drugs;

    function render(data) {
        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(d => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="${d.photo}" width="100%" style="border-radius:10px"><br>
                <b>${d.name}</b><br>
                🧬 ${d.sostav}<br>
                💊 ${d.form} (${d.dosage})<br>
                🤒 ${d.indications}<br>

                <button onclick="selectDrug('${d.name}')">Выбрать</button>
                <button onclick="openLink('${d.url}')">🌐 Сайт</button>
            `;

            list.appendChild(div);
        });
    }

    function selectDrug(name) {
        tg.sendData(JSON.stringify({
            action: "select",
            name: name
        }));
    }

    function openLink(url) {
        window.open(url, "_blank");
    }

    document.getElementById("search").addEventListener("input", (e) => {
        const q = e.target.value.toLowerCase();

        filtered = drugs.filter(d =>
            d.name.toLowerCase().includes(q) ||
            d.indications.toLowerCase().includes(q) ||
            d.group.toLowerCase().includes(q)
        );

        render(filtered);
    });

    render(drugs);
</script>

</body>
</html>

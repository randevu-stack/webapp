<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Каталог</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

/* 🔥 КОНТЕЙНЕР (главный фикс) */
.container {
    max-width: 480px;
    margin: 0 auto;
    padding: 12px;
}

/* 🔥 HEADER */
h3 {
    text-align: center;
    margin-bottom: 10px;
}

/* 🔍 ПОИСК */
input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-bottom: 12px;
    font-size: 14px;
}

/* 📦 СЕТКА */
#list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

/* 📦 КАРТОЧКА */
.card {
    background: white;
    border-radius: 16px;
    padding: 10px;
    text-align: center;

    box-shadow: 0 4px 10px rgba(0,0,0,0.08);

    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* 🖼 ФОТО */
.photo {
    width: 100%;
    height: 120px;
    object-fit: contain;
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
}

/* 📌 ТЕКСТ */
.name {
    font-weight: bold;
    font-size: 15px;
}

.info {
    font-size: 13px;
    color: #666;
    margin: 5px 0;
}

/* 🔘 КНОПКИ */
button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #3aa0ff, #2ea6ff);
    color: white;
    font-size: 14px;
    cursor: pointer;
}

.btn-secondary {
    background: #4caf50;
}

.back-btn {
    background: #ddd;
    color: black;
}

/* 📖 КАРТОЧКА ПОЛНАЯ */
.card-full {
    background: white;
    border-radius: 16px;
    padding: 14px;
}

.card-full img {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    margin-bottom: 10px;
    border-radius: 12px;
    cursor: pointer;
}

/* 🔘 ГРУППА КНОПОК */
.btn-group {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* 📄 ПОКАЗАНИЯ */
ul {
    padding-left: 18px;
}

/* 🔍 ZOOM */
#zoomModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#zoomImg {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
}

/* ❌ УБРАЛИ СКРОЛЛ ВПРАВО */
html, body {
    overflow-x: hidden;
}
</style>
</head>

<body>

<div class="container">

    <h3>💊 Каталог</h3>

    <input id="search" placeholder="Поиск по названию или симптомам...">

    <div id="list"></div>
    <div id="cardView" style="display:none;"></div>

</div>

<!-- ZOOM -->
<div id="zoomModal" onclick="closeZoom()">
    <img id="zoomImg">
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// 🔍 ПОИСК (умный)
document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase().trim();

    if (!q) return render(drugs);

    const words = q.split(/\s+/);

    const filtered = drugs.filter(d => {
        const text = `
            ${d.name || ""}
            ${d.indications || ""}
            ${d.group || ""}
            ${d.sostav || ""}
        `.toLowerCase();

        return words.every(w => text.includes(w));
    });

    render(filtered);
});

// 📦 РЕНДЕР
function render(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(d => {
        list.innerHTML += `
        <div class="card">
            <img src="${d.photo}" class="photo" onclick="zoomImage('${d.photo}')">

            <div class="name">${d.name}</div>

            <div class="info">
                ${d.sostav}<br>
                ${d.form} (${d.dosage})
            </div>

            <button onclick="openCard('${d.name}')">Открыть</button>
        </div>
        `;
    });
}

// 📖 ОТКРЫТЬ
function openCard(name) {
    const d = drugs.find(x => x.name === name);
    if (!d) return;

    document.getElementById("list").style.display = "none";
    document.getElementById("search").style.display = "none";

    const view = document.getElementById("cardView");
    view.style.display = "block";

    view.innerHTML = `
        <div class="card-full">

            <img src="${d.photo}" onclick="zoomImage('${d.photo}')">

            <h3>${d.name}</h3>

            <p><b>Состав:</b> ${d.sostav}</p>
            <p><b>Форма:</b> ${d.form}</p>
            <p><b>Дозировка:</b> ${d.dosage}</p>
            <p><b>Группа:</b> ${d.group}</p>

            <p><b>Показания:</b></p>
            ${formatIndications(d.indications)}

            <div class="btn-group">
                <button onclick="selectDrug('${d.name}')">Выбрать</button>
                <button class="btn-secondary" onclick="window.open('${d.url}')">🌐 Сайт</button>
                <button class="back-btn" onclick="goBack()">⬅️ Назад</button>
            </div>

        </div>
    `;
}

// 🔙 НАЗАД
function goBack() {
    document.getElementById("cardView").style.display = "none";
    document.getElementById("list").style.display = "grid";
    document.getElementById("search").style.display = "block";
}

// 🧠 ПОКАЗАНИЯ
function formatIndications(text) {
    if (!text || text.trim() === "") return "<p>—</p>";

    if (text.includes("<table")) return text;

    if (text.includes(";")) {
        let items = text.split(";").filter(i => i.trim());
        return "<ul>" + items.map(i => `<li>${i}</li>`).join("") + "</ul>";
    }

    return `<p>${text}</p>`;
}

// 🔍 ZOOM
function zoomImage(src) {
    document.getElementById("zoomImg").src = src;
    document.getElementById("zoomModal").style.display = "flex";
}

function closeZoom() {
    document.getElementById("zoomModal").style.display = "none";
}

// 📤 В БОТА
function selectDrug(name) {
    tg.sendData(JSON.stringify({name}));
}

// старт
render(drugs);
</script>

</body>
</html>

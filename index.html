<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurabek Laboratories</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, Arial;
    background: #f2f2f7;
}

/* HEADER */
.header {
    padding: 14px;
    font-size: 18px;
    font-weight: 600;
}

/* SEARCH */
.top {
    padding: 10px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #e9e9ee;
    font-size: 14px;
}

/* LIST */
#list {
    display: grid;
    gap: 14px;
    padding: 10px;
}

/* CARD */
.card {
    background: white;
    border-radius: 18px;
    padding: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 150px;
    object-fit: contain;
    border-radius: 12px;
    background: #f7f7f7;
}

.big-img {
    height: 220px !important;
}

/* TEXT */
.title {
    font-size: 17px;
    font-weight: 600;
    margin-top: 8px;
}

.desc {
    font-size: 13px;
    color: #666;
    margin-top: 6px;
    line-height: 1.4;
}

/* BUTTON */
.btn {
    margin-top: 12px;
    background: #0a84ff;
    color: white;
    text-align: center;
    padding: 11px;
    border-radius: 12px;
    font-weight: 500;
    cursor: pointer;
}

.btn.green {
    background: #34c759;
}
</style>
</head>

<body>

<div class="header">Jurabek Laboratories 🧬</div>

<div class="top">
    <input id="search" placeholder="Поиск препаратов..." oninput="search()">
</div>

<div id="list"></div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();
tg.enableClosingConfirmation();

let isDetailOpen = false;

// ===== РЕНДЕР =====
function render(data){
    isDetailOpen = false;
    tg.BackButton.hide();

    let html = "";

    data.forEach((d, index)=>{
        html += `
        <div class="card">

            ${d.photo ? `<img src="${d.photo}">` : ''}

            <div class="title">${d.name}</div>

            <div class="desc">
                ${d.sostav || ''}
                ${d.form ? '<br>' + d.form : ''}
                ${d.dosage ? ' (' + d.dosage + ')' : ''}
            </div>

            <div class="btn" onclick="openDrug(${index})">
                Открыть
            </div>

        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

// ===== ПОИСК =====
function search(){
    let q = document.getElementById("search").value.toLowerCase();

    let result = drugs.filter(d=>{
        let text = (
            (d.name || '') + " " +
            (d.indications || '') + " " +
            (d.sostav || '')
        ).toLowerCase();

        return text.includes(q);
    });

    render(result);
}

// ===== ОТКРЫТИЕ =====
function openDrug(index){
    isDetailOpen = true;
    tg.BackButton.show();

    const d = drugs[index];

    document.getElementById("list").innerHTML = `
        <div class="card">

            ${d.photo ? `<img src="${d.photo}" class="big-img">` : ''}

            <div class="title">${d.name}</div>

            <div class="desc">
                <b>Состав:</b><br>${d.sostav || '-'}<br><br>

                <b>Форма:</b><br>
                ${d.form || ''} ${d.dosage ? '(' + d.dosage + ')' : ''}<br><br>

                <b>Показания:</b><br>
                ${d.indications || '-'}
            </div>

            <div class="btn" onclick="goBack()">← Назад</div>

            ${d.url ? `
            <div class="btn green" onclick="window.open('${d.url}', '_blank')">
                Перейти на сайт
            </div>
            ` : ''}

        </div>
    `;
}

// ===== НАЗАД =====
function goBack(){
    isDetailOpen = false;
    tg.BackButton.hide();
    render(drugs);
}

// ===== TELEGRAM BACK BUTTON =====
tg.BackButton.onClick(function () {
    if (isDetailOpen) {
        goBack();
    }
});

// ===== СТАРТ =====
render(drugs);

</script>

</body>
</html>

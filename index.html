<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurabek Laboratories</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body {margin:0;font-family:-apple-system,Arial;background:#f2f2f7;}

.header {padding:14px;font-size:18px;font-weight:600;}

.top {padding:10px; position: relative;}

input {
    width:100%;padding:12px;border-radius:12px;
    border:none;background:#e9e9ee;font-size:14px;
}

/* подсказки */
.suggestions {
    position:absolute;
    top:52px;
    left:10px;
    right:10px;
    background:white;
    border-radius:12px;
    box-shadow:0 4px 18px rgba(0,0,0,0.1);
    z-index:1000;
    max-height:200px;
    overflow:auto;
}

.suggestion {
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.suggestion:last-child {border-bottom:none;}

#list {display:grid;gap:14px;padding:10px;}

.card {
    background:white;border-radius:18px;
    padding:12px;box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

.card img {
    width:100%;height:150px;
    object-fit:contain;border-radius:12px;
    background:#f7f7f7;
}

.big-img {height:220px !important; cursor:pointer;}

.title {font-size:17px;font-weight:600;margin-top:8px;}

.desc {font-size:13px;color:#666;margin-top:6px;}

.btn {
    margin-top:10px;background:#0a84ff;color:white;
    text-align:center;padding:10px;border-radius:12px;
    cursor:pointer;
}

.btn.green {background:#34c759;}

/* избранное */
.fav {
    position:absolute;
    top:10px;
    right:10px;
    font-size:20px;
    cursor:pointer;
}

/* zoom */
.zoom-modal {
    position:fixed;width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    display:none;justify-content:center;align-items:center;
    z-index:9999;
}

.zoom-modal img {max-width:90%;max-height:90%;}

.zoom-close {
    position:absolute;top:20px;right:20px;
    font-size:28px;color:white;cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Jurabek Laboratories 🧬</div>

<div class="top">
    <input id="search" placeholder="Поиск..." oninput="debounceSearch()">
    <div id="suggestions" class="suggestions"></div>
</div>

<div id="list"></div>

<div id="zoomModal" class="zoom-modal" onclick="closeZoom()">
    <span class="zoom-close">✕</span>
    <img id="zoomImg">
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();
tg.enableClosingConfirmation();

let isDetailOpen = false;
let currentList = [...drugs];
let debounceTimer = null;

// ===== FAVORITES =====
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

function toggleFav(name){
    if(favorites.includes(name)){
        favorites = favorites.filter(f=>f!==name);
    } else {
        favorites.push(name);
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
    search();
}

// ===== NORMALIZE =====
function norm(t){ return (t||"").toLowerCase().trim(); }

// ===== RENDER =====
function render(data){
    isDetailOpen = false;
    tg.BackButton.hide();
    currentList = data;

    let html = "";

    data.forEach((d,i)=>{
        let isFav = favorites.includes(d.name);

        html += `
        <div class="card" style="position:relative">

            <div class="fav" onclick="toggleFav('${d.name}')">
                ${isFav ? "❤️" : "🤍"}
            </div>

            ${d.photo ? `<img src="${d.photo}">` : ''}

            <div class="title">${d.name}</div>

            <div class="desc">${d.sostav || ''}</div>

            <div class="btn" onclick="openDrug(${i})">Открыть</div>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

// ===== SEARCH =====
function search(){
    let q = norm(document.getElementById("search").value);

    document.getElementById("suggestions").innerHTML = "";

    if(!q){
        render(drugs);
        return;
    }

    let exact=[],starts=[],contains=[],symptoms=[];

    drugs.forEach(d=>{
        let name=norm(d.name);
        let ind=norm(d.indications);

        if(name===q){ exact.push(d); return; }
        if(name.startsWith(q)){ starts.push(d); return; }
        if(name.includes(q)){ contains.push(d); return; }
        if(ind.includes(q)){ symptoms.push(d); }
    });

    let result=[...exact,...starts,...contains,...symptoms];
    render(result);

    showSuggestions(q);
}

// ===== SUGGESTIONS =====
function showSuggestions(q){
    let box=document.getElementById("suggestions");
    let html="";

    let list = drugs
        .filter(d=>norm(d.name).includes(q))
        .slice(0,5);

    list.forEach(d=>{
        html+=`<div class="suggestion" onclick="selectSuggestion('${d.name}')">${d.name}</div>`;
    });

    box.innerHTML = html;
}

function selectSuggestion(text){
    document.getElementById("search").value=text;
    document.getElementById("suggestions").innerHTML="";
    search();
}

// ===== DEBOUNCE =====
function debounceSearch(){
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(search, 200);
}

// ===== OPEN =====
function openDrug(i){
    isDetailOpen=true;
    tg.BackButton.show();

    let d=currentList[i];

    document.getElementById("list").innerHTML=`
    <div class="card">

        ${d.photo ? `<img src="${d.photo}" class="big-img" onclick="event.stopPropagation(); openZoom('${d.photo}')">` : ''}

        <div class="title">${d.name}</div>

        <div class="desc">
        <b>Состав:</b><br>${d.sostav || '-'}<br><br>
        <b>Показания:</b><br>${d.indications || '-'}
        </div>

        <div class="btn" onclick="goBack()">← Назад</div>
    </div>`;
}

// ===== BACK =====
function goBack(){
    isDetailOpen=false;
    tg.BackButton.hide();
    search();
}

// ===== ZOOM =====
function openZoom(src){
    document.getElementById("zoomImg").src=src;
    document.getElementById("zoomModal").style.display="flex";
}
function closeZoom(){
    document.getElementById("zoomModal").style.display="none";
}

// ===== TELEGRAM BACK =====
tg.BackButton.onClick(()=>{ if(isDetailOpen) goBack(); });

// ===== START =====
render(drugs);

</script>

</body>
</html>

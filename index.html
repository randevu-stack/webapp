<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurabek Laboratories</title>

<script src="data.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, Arial;
    background: #f2f2f7;
}

/* HEADER */
.header {
    padding: 12px;
    font-size: 18px;
    font-weight: bold;
}

/* SEARCH */
.top {
    padding: 10px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #e9e9ee;
    font-size: 14px;
}

/* LIST */
#list {
    display: grid;
    gap: 14px;
    padding: 10px;
}

/* CARD */
.card {
    background: white;
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 140px;
    object-fit: contain;
    border-radius: 12px;
    background: #f7f7f7;
}

/* TITLE */
.title {
    font-size: 16px;
    font-weight: 600;
    margin-top: 8px;
}

/* DESC */
.desc {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
    line-height: 1.3;
}

/* BUTTON */
.btn {
    margin-top: 10px;
    background: #0a84ff;
    color: white;
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    font-weight: 500;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Jurabek Laboratories 🧬</div>

<div class="top">
    <input id="search" placeholder="Введите симптомы или название" oninput="search()">
</div>

<div id="list"></div>

<script>

// РЕНДЕР
function render(data){
    let html = "";

    data.forEach(d=>{
        html += `
        <div class="card">

            ${d.photo ? `<img src="${d.photo}">` : ''}

            <div class="title">${d.name}</div>

            <div class="desc">
                ${d.sostav || ''}
                ${d.form ? '<br>' + d.form : ''}
                ${d.dosage ? ' ' + d.dosage : ''}
            </div>

            <div class="btn" onclick="openLink('${d.url || '#'}')">
                Открыть
            </div>

        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

// ПОИСК
function search(){
    let q = document.getElementById("search").value.toLowerCase();

    let result = drugs.filter(d=>{
        let text = (
            (d.name || '') + " " +
            (d.indications || '') + " " +
            (d.sostav || '')
        ).toLowerCase();

        return text.includes(q);
    });

    render(result);
}

// КНОПКА
function openLink(url){
    if(!url || url === '#'){
        alert("Ссылка не добавлена");
        return;
    }
    window.open(url, "_blank");
}

// СТАРТ
render(drugs);

</script>

</body>
</html>

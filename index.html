<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system, Arial;
    background:#f2f2f7;
}

/* HEADER */
.header{
    background:#f4f4f4;
    padding:12px;
    border-bottom:1px solid #ddd;
}

.header-top{
    display:flex;
    gap:10px;
    align-items:center;
}

.logo{ width:42px; }

.brand{
    font-weight:700;
    color:#1f4fa3;
}

.sub{
    font-size:11px;
    color:#666;
}

.contacts{
    margin-top:8px;
    font-size:12px;
}

/* SEARCH */
.top{ padding:10px; }

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#e9e9ee;
}

/* TABS */
.tabs{
    display:flex;
    gap:10px;
    padding:10px;
}

.tab{
    flex:1;
    text-align:center;
    padding:10px;
    background:#e9e9ee;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
}

.tab.active{
    background:#0a84ff;
    color:white;
}

/* GRID */
#list{
    display:grid;
    gap:14px;
    padding:10px;
}

@media(min-width:600px){
    #list{ grid-template-columns:repeat(2,1fr); }
}

@media(min-width:1024px){
    #list{ grid-template-columns:repeat(3,1fr); }
}

/* CARD */
.card{
    background:white;
    border-radius:18px;
    padding:12px;
    box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

/* IMAGE + HEART */
.card-img-wrap{
    position:relative;
}

.card img{
    width:100%;
    height:150px;
    object-fit:contain;
    background:#f7f7f7;
    border-radius:12px;
}

.big-img{
    height:220px;
}

.fav{
    position:absolute;
    top:8px;
    right:8px;
    width:32px;
    height:32px;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.fav.active{
    color:red;
}

.title{
    font-weight:600;
    margin-top:8px;
}

.form{
    font-size:13px;
    color:#0a84ff;
    margin-top:4px;
}

.desc{
    font-size:13px;
    color:#666;
    margin-top:6px;
}

.btn{
    margin-top:10px;
    background:#0a84ff;
    color:white;
    padding:10px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
}

.btn.green{
    background:#34c759;
}

.empty{
    padding:30px;
    text-align:center;
    color:#888;
}
</style>
</head>

<body>

<div class="header">
    <div class="header-top">
        <img src="logo.png" class="logo">
        <div>
            <div class="brand">JURABEK<br>Laboratories LTD</div>
            <div class="sub">Производство лекарственных средств широкого спектра</div>
        </div>
    </div>

    <div class="contacts">
        📞 +998 (78) 150-03-03<br>
        ✉️ info@jurabek.uz<br>
        📅 Пн–Пт 9:00–18:00
    </div>
</div>

<div class="top">
    <input id="search" placeholder="Поиск..." oninput="search()">
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab('all', this)">Товары</div>
    <div class="tab" onclick="switchTab('fav', this)">Избранное</div>
    <div class="tab" onclick="switchTab('recent', this)">Недавние</div>
</div>

<div id="list"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let isDetailOpen = false;
let scrollPos = 0;
let currentTab = "all";

let favorites = JSON.parse(localStorage.getItem("fav") || "[]");
let recent = JSON.parse(localStorage.getItem("recent") || "[]");

/* ===== НОРМ ===== */
function norm(t){
    return (t||"").toLowerCase().trim();
}

/* ===== БАЗА ===== */
function getBaseList(){
    if(currentTab === "all") return drugs;
    if(currentTab === "fav") return drugs.filter(d => favorites.includes(d.name));
    if(currentTab === "recent") return drugs.filter(d => recent.includes(d.name));
}

/* ===== ПОИСК ===== */
function search(){
    let q = norm(document.getElementById("search").value);
    let base = getBaseList();

    if(!q){
        render(base);
        return;
    }

    let res = base.filter(d=>{
        let text = norm([d.name, d.indications, d.sostav].join(" "));
        return text.includes(q);
    });

    render(res);
}

/* ===== ВКЛАДКИ ===== */
function switchTab(tab, el){
    currentTab = tab;

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");

    document.getElementById("search").value = "";
    render(getBaseList());
}

/* ===== РЕНДЕР ===== */
function render(data){
    if(!data.length){
        document.getElementById("list").innerHTML =
            '<div class="empty">Ничего не найдено</div>';
        return;
    }

    let html = "";

    data.forEach(d=>{
        html += `
        <div class="card">

            <div class="card-img-wrap">
                ${d.photo ? `<img src="${d.photo}">` : ''}

                <div class="fav ${favorites.includes(d.name) ? 'active' : ''}"
                     onclick="toggleFav('${d.name}'); event.stopPropagation();">
                    ${favorites.includes(d.name) ? '❤️' : '🤍'}
                </div>
            </div>

            <div class="title">${d.name}</div>

            ${(d.form || d.dosage) ? `
            <div class="form">
                ${d.form || ''} ${d.dosage ? '('+d.dosage+')' : ''}
            </div>` : ''}

            <div class="btn" onclick="openDrug('${d.name}')">
                Открыть
            </div>

        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

/* ===== ОТКРЫТЬ ===== */
function openDrug(name){
    let d = drugs.find(x => norm(x.name) === norm(name));
    if(!d) return;

    scrollPos = window.scrollY;
    isDetailOpen = true;
    tg.BackButton.show();

    if(!recent.includes(d.name)){
        recent.unshift(d.name);
        if(recent.length > 20) recent.pop();
        localStorage.setItem("recent", JSON.stringify(recent));
    }

    document.getElementById("list").innerHTML = `
    <div class="card">

        <div class="card-img-wrap">
            ${d.photo ? `<img src="${d.photo}" class="big-img">` : ''}

            <div class="fav ${favorites.includes(d.name) ? 'active' : ''}"
                 onclick="toggleFav('${d.name}')">
                ${favorites.includes(d.name) ? '❤️' : '🤍'}
            </div>
        </div>

        <div class="title">${d.name}</div>

        <div class="desc">
            <b>Состав:</b><br>${d.sostav || '-'}<br><br>

            <b>Форма:</b><br>
            ${d.form || '-'} ${d.dosage ? '('+d.dosage+')' : ''}<br><br>

            <b>Показания:</b><br>
            ${d.indications || '-'}
        </div>

        <div class="btn" onclick="goBack()">← Назад</div>

        ${d.url ? `
        <div class="btn green" onclick="tg.openLink(\`${d.url}\`)">
            🌐 Открыть сайт
        </div>` : ''}

        <div class="btn" onclick="shareLink('${d.name}')">
            🔗 Поделиться
        </div>

    </div>`;
}

/* ===== ИЗБРАННОЕ ===== */
function toggleFav(name){
    if(favorites.includes(name)){
        favorites = favorites.filter(x => x !== name);
    } else {
        favorites.push(name);
    }

    localStorage.setItem("fav", JSON.stringify(favorites));

    if(!isDetailOpen){
        render(getBaseList());
    } else {
        openDrug(name);
    }
}

/* ===== SHARE ===== */
function shareLink(name){
    let link = `https://webapp-alpha-nine-95.vercel.app?drug=${encodeURIComponent(name)}`;
    tg.openLink(`https://t.me/share/url?url=${encodeURIComponent(link)}`);
}

/* ===== НАЗАД ===== */
function goBack(){
    isDetailOpen = false;
    tg.BackButton.hide();
    render(getBaseList());
    setTimeout(()=>window.scrollTo(0, scrollPos), 0);
}

tg.BackButton.onClick(()=>{
    if(isDetailOpen) goBack();
});

/* СТАРТ */
render(getBaseList());
</script>

</body>
</html>

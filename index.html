<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск препаратов</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f9;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 15px;
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .category {
      color: #777;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .symptoms {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .btn {
      display: block;
      text-align: center;
      background: #2b7cff;
      color: white;
      padding: 10px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
    }

    .empty {
      text-align: center;
      color: #999;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>💊 Поиск препаратов</h1>

  <input 
    type="text" 
    id="search" 
    placeholder="Введите название или симптомы..."
  >

  <div id="results"></div>
</div>

<script>
  // 🔹 База (заменишь на свою)
  const drugs = [
    {
      name: "Торасса",
      category: "Сердечно-сосудистые",
      symptoms: "давление отеки сердце",
      link: "#"
    },
    {
      name: "Амиодарон",
      category: "Антиаритмические",
      symptoms: "аритмия тахикардия сердце",
      link: "#"
    }
  ];

  const input = document.getElementById("search");
  const results = document.getElementById("results");

  input.addEventListener("input", () => {
    const query = input.value.toLowerCase().trim();
    results.innerHTML = "";

    if (!query) {
      results.innerHTML = `<div class="empty">Введите запрос 👆</div>`;
      return;
    }

    const words = query.split(/\s+/);

    const filtered = drugs.filter(drug => {
      const text = (drug.name + " " + drug.symptoms).toLowerCase();

      // 🔥 поиск по нескольким словам
      return words.some(word => text.includes(word));
    });

    if (filtered.length === 0) {
      results.innerHTML = `<div class="empty">❌ Ничего не найдено</div>`;
      return;
    }

    filtered.forEach(drug => {
      results.innerHTML += `
        <div class="card">
          <div class="title">💊 ${drug.name}</div>
          <div class="category">📂 ${drug.category}</div>
          <div class="symptoms">🩺 ${drug.symptoms}</div>
          <a class="btn" href="${drug.link}" target="_blank">Подробнее</a>
        </div>
      `;
    });
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system, Arial;
    background:#f2f2f7;
    max-width:1200px;
    margin:auto;
}

.header { padding:12px;background:#f4f4f4;border-bottom:1px solid #ddd; }
.logo { width:42px; }

.top { padding:10px; }

input {
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#e9e9ee;
}

#list {
    display:grid;
    gap:14px;
    padding:10px;
}

@media (min-width:600px){
    #list { grid-template-columns:repeat(2,1fr); }
}
@media (min-width:1024px){
    #list { grid-template-columns:repeat(3,1fr); }
}

.card {
    background:white;
    border-radius:18px;
    padding:12px;
    box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

.card img {
    width:100%;
    height:150px;
    object-fit:contain;
    background:#f7f7f7;
    border-radius:12px;
}

.big-img {
    width:100%;
    height:220px;
    object-fit:contain;
    background:#f7f7f7;
    border-radius:12px;
}

.title { font-weight:600;margin-top:8px; }
.desc { font-size:13px;color:#666;margin-top:6px; }
.form { margin-top:4px;color:#0a84ff;font-size:13px; }

.btn {
    margin-top:10px;
    background:#0a84ff;
    color:white;
    padding:10px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <b>JURABEK Laboratories LTD</b>
</div>

<div class="top">
    <input id="search" placeholder="Поиск..." oninput="search()">
</div>

<div id="list"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let isDetailOpen=false;
let currentList=[...drugs];

function norm(t){return (t||"").toLowerCase();}

/* ===== ПОЛУЧАЕМ ПАРАМЕТР ===== */
function getParam(){
    const params = new URLSearchParams(window.location.search);
    return params.get("drug");
}

/* ===== ПОИСК ===== */
function search(){
    let q = norm(document.getElementById("search").value);

    if(!q){ render(drugs); return; }

    let res = drugs.filter(d=>{
        return norm(d.name + d.indications + d.sostav).includes(q);
    });

    render(res);
}

/* ===== РЕНДЕР ===== */
function render(data){
    currentList=data;

    let html="";

    data.forEach((d,i)=>{
        html+=`
        <div class="card">
            ${d.photo?`<img src="${d.photo}">`:''}
            <div class="title">${d.name}</div>

            ${(d.form||d.dosage)?`
            <div class="form">
                ${d.form||''} ${d.dosage ? '('+d.dosage+')' : ''}
            </div>`:''}

            <div class="btn" onclick="openDrug(${i})">Открыть</div>
        </div>`;
    });

    document.getElementById("list").innerHTML=html;
}

/* ===== ОТКРЫТИЕ ===== */
function openDrug(i){
    let d=currentList[i];
    isDetailOpen=true;

    document.getElementById("list").innerHTML=`
    <div class="card">

        ${d.photo?`<img src="${d.photo}" class="big-img">`:''}

        <div class="title">${d.name}</div>

        <div class="desc">
            <b>Состав:</b><br>${d.sostav||'-'}<br><br>

            <b>Форма:</b><br>
            ${d.form||'-'} ${d.dosage ? '('+d.dosage+')' : ''}<br><br>

            <b>Показания:</b><br>
            ${d.indications||'-'}
        </div>

        <div class="btn" onclick="goBack()">← Назад</div>
    </div>`;
}

/* ===== НАЗАД ===== */
function goBack(){
    isDetailOpen=false;
    render(drugs);
}

/* ===== 🔥 АВТО ОТКРЫТИЕ ===== */
function autoOpen(){
    let key = getParam();
    if(!key) return;

    let found = drugs.find(d => norm(d.name) === norm(key));
    if(found){
        currentList = [found];
        openDrug(0);
    }
}

/* ===== СТАРТ ===== */
render(drugs);
autoOpen();
</script>

</body>
</html>

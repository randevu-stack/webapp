<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
body {
    margin:0;
    font-family:-apple-system, Arial;
    background:#f2f2f7;
    max-width:1200px;
    margin:auto;
}

.header {
    background:#f4f4f4;
    padding:12px;
    border-bottom:1px solid #ddd;
}

.brand {
    font-weight:700;
    color:#1f4fa3;
}

.top { padding:10px; }

input {
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#e9e9ee;
}

#list {
    display:grid;
    gap:14px;
    padding:10px;
}

@media (min-width:600px){
    #list { grid-template-columns:repeat(2,1fr); }
}
@media (min-width:1024px){
    #list { grid-template-columns:repeat(3,1fr); }
}

.card {
    background:white;
    border-radius:18px;
    padding:12px;
}

.card img {
    width:100%;
    height:150px;
    object-fit:contain;
}

.title { font-weight:600;margin-top:8px; }

.form { color:#0a84ff;font-size:13px;margin-top:4px; }

.btn {
    margin-top:10px;
    background:#0a84ff;
    color:white;
    padding:10px;
    text-align:center;
    border-radius:12px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div class="brand">JURABEK Laboratories LTD</div>
</div>

<div class="top">
    <input id="search" placeholder="Поиск..." oninput="search()">
</div>

<div id="list"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let currentList = [...drugs];
let isDetailOpen = false;

/* ===== ПОИСК ===== */
function search(){
    let q = (document.getElementById("search").value || "").toLowerCase();

    if(!q){
        render(drugs);
        return;
    }

    let res = drugs.filter(d =>
        (d.name + d.indications + d.sostav).toLowerCase().includes(q)
    );

    render(res);
}

/* ===== РЕНДЕР ===== */
function render(data){
    currentList = data;

    let html = "";

    data.forEach((d,i)=>{
        html += `
        <div class="card">
            ${d.photo ? `<img src="${d.photo}">` : ''}

            <div class="title">${d.name}</div>

            ${(d.form || d.dosage) ? `
            <div class="form">
                ${d.form || ''} ${d.dosage ? '(' + d.dosage + ')' : ''}
            </div>` : ''}

            <div class="btn" onclick="openDrug(${i})">Открыть</div>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

/* ===== ОТКРЫТИЕ ===== */
function openDrug(i){
    let d = currentList[i];
    isDetailOpen = true;
    tg.BackButton.show();

    document.getElementById("list").innerHTML = `
    <div class="card">

        ${d.photo ? `<img src="${d.photo}">` : ''}

        <div class="title">${d.name}</div>

        <div>
            <b>Состав:</b><br>${d.sostav}<br><br>
            <b>Показания:</b><br>${d.indications}
        </div>

        <div class="btn" onclick="goBack()">← Назад</div>

        ${d.url ? `
        <div class="btn" onclick="tg.openLink('${d.url}')">
            🌐 Сайт
        </div>` : ''}

        <div class="btn" onclick="share(${d.id})">
            📤 Поделиться
        </div>

    </div>
    `;
}

/* ===== SHARE (ID) ===== */
function share(id){
    let bot = "jurabek_helper_bot";

    let payload = "drug_" + id + "_preview";
    let link = "https://t.me/" + bot + "?start=" + payload;

    tg.openLink("https://t.me/share/url?url=" + encodeURIComponent(link));
}

/* ===== НАЗАД ===== */
function goBack(){
    isDetailOpen = false;
    tg.BackButton.hide();
    render(drugs);
}

/* ===== AUTO OPEN ===== */
function autoOpen(){
    const params = new URLSearchParams(window.location.search);
    let id = params.get("drug");

    if(!id) return;

    id = Number(id);

    let index = drugs.findIndex(d => d.id === id);

    if(index !== -1){
        openDrug(index);
    }
}

tg.BackButton.onClick(()=>{
    if(isDetailOpen) goBack();
});

render(drugs);
autoOpen();
</script>

</body>
</html>

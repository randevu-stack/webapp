<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Каталог</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    background: #f2f2f2;

    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
}

/* КОНТЕЙНЕР */
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 12px;
}

/* HEADER */
h3 {
    text-align: center;
    margin-bottom: 10px;
}

/* SEARCH */
input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    margin-bottom: 12px;
}

/* GRID */
#list {
    display: grid;
    gap: 12px;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    #list { grid-template-columns: 1fr; }
}

/* 📲 TABLET */
@media (min-width: 601px) and (max-width: 900px) {
    #list { grid-template-columns: 1fr 1fr; }
}

/* 💻 PC */
@media (min-width: 901px) {
    #list { grid-template-columns: 1fr 1fr 1fr; }
}

/* CARD */
.card {
    background: white;
    border-radius: 16px;
    padding: 10px;
    text-align: center;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    height: 240px;

    box-shadow: 0 4px 10px rgba(0,0,0,0.08);

    transition: all 0.25s ease;
}

.card:active {
    transform: scale(0.97);
}

/* IMAGE */
.photo {
    width: 100%;
    height: 110px;
    object-fit: contain;
}

/* TEXT */
.name {
    font-weight: bold;
    font-size: 15px;

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.info {
    font-size: 12px;
    color: #666;

    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* BUTTON */
button {
    width: 90%;
    margin: 0 auto;
    padding: 8px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #3aa0ff, #2ea6ff);
    color: white;
}

/* SCREEN ANIMATION */
.screen {
    transition: all 0.3s ease;
}

.hidden {
    opacity: 0;
    transform: translateX(20px);
    pointer-events: none;
}

.visible {
    opacity: 1;
    transform: translateX(0);
}

/* FULL CARD */
.card-full {
    background: white;
    border-radius: 16px;
    padding: 14px;
}

.card-full img {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
}

/* BOTTOM BAR */
.bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;

    background: white;
    padding: 10px;

    border-top: 1px solid #ddd;

    display: flex;
    gap: 10px;
}

.bottom-bar button {
    flex: 1;
}

/* INDICATIONS */
ul {
    padding-left: 18px;
}

/* ZOOM */
#zoomModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
}

#zoomImg {
    max-width: 90%;
    max-height: 90%;
}
</style>
</head>

<body>

<div class="container">

<h3>💊 Каталог</h3>

<input id="search" placeholder="Поиск...">

<div id="list" class="screen visible"></div>

<div id="cardView" class="screen hidden"></div>

</div>

<div class="bottom-bar" id="bottomBar" style="display:none;">
    <button onclick="goBack()">⬅️ Назад</button>
    <button onclick="openSite()">🌐 Сайт</button>
</div>

<div id="zoomModal" onclick="closeZoom()">
    <img id="zoomImg">
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let currentDrug = null;

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();

    const filtered = drugs.filter(d => {
        const text = `${d.name} ${d.indications} ${d.sostav}`.toLowerCase();
        return text.includes(q);
    });

    render(filtered);
});

/* LIST */
function render(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(d => {
        list.innerHTML += `
        <div class="card" onclick="openCard('${d.name}')">
            <img src="${d.photo}" class="photo">
            <div class="name">${d.name}</div>
            <div class="info">${d.sostav}<br>${d.form}</div>
            <button>Открыть</button>
        </div>
        `;
    });
}

/* OPEN */
function openCard(name) {
    const d = drugs.find(x => x.name === name);
    currentDrug = d;

    document.getElementById("list").classList.replace("visible", "hidden");
    document.getElementById("search").style.display = "none";

    const view = document.getElementById("cardView");
    view.classList.replace("hidden", "visible");

    view.innerHTML = `
        <div class="card-full">
            <img src="${d.photo}" onclick="zoomImage('${d.photo}')">

            <h3>${d.name}</h3>

            <p><b>Состав:</b> ${d.sostav}</p>
            <p><b>Форма:</b> ${d.form}</p>
            <p><b>Дозировка:</b> ${d.dosage}</p>
            <p><b>Группа:</b> ${d.group}</p>

            <p><b>Показания:</b></p>
            ${formatIndications(d.indications)}
        </div>
    `;

    document.getElementById("bottomBar").style.display = "flex";
}

/* BACK */
function goBack() {
    document.getElementById("cardView").classList.replace("visible", "hidden");
    document.getElementById("list").classList.replace("hidden", "visible");

    document.getElementById("search").style.display = "block";
    document.getElementById("bottomBar").style.display = "none";
}

/* SITE */
function openSite() {
    if (currentDrug) window.open(currentDrug.url);
}

/* INDICATIONS */
function formatIndications(text) {
    if (!text) return "<p>—</p>";
    let items = text.split(";").filter(i => i.trim());
    return "<ul>" + items.map(i => `<li>${i}</li>`).join("") + "</ul>";
}

/* ZOOM */
function zoomImage(src) {
    document.getElementById("zoomImg").src = src;
    document.getElementById("zoomModal").style.display = "flex";
}

function closeZoom() {
    document.getElementById("zoomModal").style.display = "none";
}

/* INIT */
render(drugs);
</script>

</body>
</html>

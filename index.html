<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Каталог</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 10px;
    font-family: Arial;
    background: #f5f5f5;
    overflow-x: hidden; /* 🔥 фикс уезда вправо */
}

h3 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* 📱 АДАПТИВНАЯ СЕТКА */
#list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

/* 📱 если что-то пойдет не так */
@media (max-width: 350px) {
    #list {
        grid-template-columns: 1fr;
    }
}

.card {
    background: white;
    padding: 10px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);

    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 100%;
}

.photo {
    width: 100%;
    max-width: 120px;
    height: 120px;
    object-fit: contain;
    margin: 0 auto 8px;
    border-radius: 10px;
    cursor: pointer;
}

img {
    max-width: 100%;
    height: auto;
}

.name {
    font-weight: bold;
}

.info {
    font-size: 13px;
    color: #555;
}

button {
    margin-top: 5px;
    padding: 8px;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: #2ea6ff;
    color: white;
    cursor: pointer;
}

.btn-secondary {
    background: #4caf50;
}

.back-btn {
    background: #ccc;
    color: black;
}

.btn-group {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.card-full {
    background: white;
    padding: 15px;
    border-radius: 12px;
}

.card-full img {
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
}

#cardView {
    display: none;
}

ul {
    text-align: left;
}

#zoomModal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#zoomImg {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    background: white;
}
</style>
</head>

<body>

<h3>💊 Каталог</h3>

<input id="search" placeholder="Поиск по названию или симптомам...">

<div id="list"></div>
<div id="cardView"></div>

<!-- ZOOM -->
<div id="zoomModal" onclick="closeZoom()">
    <img id="zoomImg">
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// 🔍 ПОИСК
document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase().trim();

    if (!q) return render(drugs);

    const words = q.split(/\s+/);

    const filtered = drugs.filter(d => {
        const text = `
            ${d.name || ""}
            ${d.indications || ""}
            ${d.group || ""}
            ${d.sostav || ""}
        `.toLowerCase();

        return words.every(w => text.includes(w));
    });

    render(filtered);
});

// 📦 СПИСОК
function render(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(d => {
        list.innerHTML += `
        <div class="card">
            <img src="${d.photo}" class="photo" onclick="zoomImage('${d.photo}')">

            <div class="name">${d.name}</div>

            <div class="info">
                ${d.sostav}<br>
                ${d.form} (${d.dosage})
            </div>

            <button onclick="openCard('${d.name}')">Открыть</button>
        </div>
        `;
    });
}

// 📖 КАРТОЧКА
function openCard(name) {
    const d = drugs.find(x => x.name === name);
    if (!d) return;

    document.getElementById("list").style.display = "none";
    document.getElementById("search").style.display = "none";

    const view = document.getElementById("cardView");
    view.style.display = "block";

    view.innerHTML = `
        <div class="card-full">
            <img src="${d.photo}" onclick="zoomImage('${d.photo}')">

            <h3>${d.name}</h3>

            <p><b>Состав:</b> ${d.sostav}</p>
            <p><b>Форма:</b> ${d.form}</p>
            <p><b>Дозировка:</b> ${d.dosage}</p>
            <p><b>Группа:</b> ${d.group}</p>

            <p><b>Показания:</b></p>
            ${formatIndications(d.indications)}

            <div class="btn-group">
                <button onclick="selectDrug('${d.name}')">Выбрать</button>
                <button class="btn-secondary" onclick="window.open('${d.url}')">🌐 Сайт</button>
                <button class="back-btn" onclick="goBack()">⬅️ Назад</button>
            </div>
        </div>
    `;
}

// 🔙 НАЗАД
function goBack() {
    document.getElementById("cardView").style.display = "none";
    document.getElementById("list").style.display = "grid";
    document.getElementById("search").style.display = "block";
}

// 🧠 ПОКАЗАНИЯ
function formatIndications(text) {
    if (!text || text.trim() === "") return "<p>—</p>";

    if (text.includes("<table")) return text;

    if (text.includes(";")) {
        let items = text.split(";").filter(i => i.trim());
        return "<ul>" + items.map(i => `<li>${i}</li>`).join("") + "</ul>";
    }

    return `<p>${text}</p>`;
}

// 🔥 ZOOM
function zoomImage(src) {
    document.getElementById("zoomImg").src = src;
    document.getElementById("zoomModal").style.display = "flex";
}

function closeZoom() {
    document.getElementById("zoomModal").style.display = "none";
}

// 📤 В БОТА
function selectDrug(name) {
    tg.sendData(JSON.stringify({name}));
}

// старт
render(drugs);
</script>

</body>
</html>
